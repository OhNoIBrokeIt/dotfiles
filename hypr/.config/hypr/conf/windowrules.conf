# =========================================================
# WINDOW RULES — block syntax (Hyprland 0.54+)
# name field required as first key in every block
# =========================================================

# --- System utility floating windows ---
windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = true
    center = true
    size = 900 700
}

windowrule {
    name = nm_connection_editor
    match:class = ^(nm-connection-editor)$
    float = true
    center = true
}

windowrule {
    name = polkit_agent
    match:class = ^(hyprpolkitagent)$
    float = true
    center = true
}

windowrule {
    name = blueman
    match:class = ^(blueman-manager)$
    float = true
    center = true
    size = 700 500
}

windowrule {
    name = nemo
    match:class = ^(nemo)$
    float = true
    center = true
    size = 1200 800
}

windowrule {
    name = kdeconnect
    match:class = ^(kdeconnect.*)$
    float = true
}

# --- Opacity ---
windowrule {
    name = kitty_opacity
    match:class = ^(kitty)$
    opacity = 0.92 0.85
}

windowrule {
    name = discord_opacity
    match:class = ^(discord)$
    opacity = 0.94 0.88
}

# --- Steam ---
windowrule {
    name = steam_no_effects
    match:class = ^(steam)$
    float = true
    no_anim = true
    no_blur = true
    no_dim = true
    opaque = true
}

windowrule {
    name = steam_games
    match:class = ^(steam_app_\d+)$
    immediate = true
    fullscreen = 1
}

windowrule {
    name = marvel_rivals
    match:class = ^(steam_app_2767030)$
    immediate = true
    fullscreen = 0
}

# --- Picture-in-Picture (resolution-independent positioning) ---
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    keep_aspect_ratio = true
    size = (monitor_w*0.25) (monitor_h*0.25)
    move = (monitor_w*0.73) (monitor_h*0.72)
    no_dim = true
}


# --- Pyprland scratchpads ---
windowrule {
    name = console_dropdown
    match:class = ^(console-dropdown)$
    float = true
    center = true
}

windowrule {
    name = files_dropdown
    match:class = ^(files-dropdown)$
    float = true
    center = true
}

# --- File chooser / portal dialogs ---
windowrule {
    name = file_dialogs
    match:title = ^(Choose Files|Save As|Open|File Upload.*|Authentication Required)$
    float = true
    center = true
}

windowrule {
    name = portal_gtk
    match:class = ^(xdg-desktop-portal-gtk)$
    float = true
    center = true
}

# =========================================================
# LAYER RULES
# =========================================================

layerrule = no_anim true,match:namespace selection

# =========================================================
# PER-APP WORKSPACE RULES
# =========================================================
windowrule {
    name = firefox_workspace
    match:class = ^(firefox)$
    workspace = 1
}

windowrule {
    name = discord_workspace
    match:class = ^(discord)$
    workspace = 2
}

windowrule {
    name = steam_workspace
    match:class = ^(Steam)$
    workspace = 3
}

windowrule {
    name = steam_games_workspace
    match:class = ^(steam_app_.*)$
    workspace = 3
}
