general {
    lock_cmd            = loginctl lock-session
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on && sleep 1 && hyprctl dispatch focuswindow address:$(hyprctl activewindow -j | python3 -c "import sys,json; print(json.load(sys.stdin)['address'])" 2>/dev/null) 2>/dev/null || true
    ignore_dbus_inhibit = false
}

# ── 3 min: dim brightness ────────────────────────────────
listener {
    timeout    = 180
    on-timeout = brightnessctl -s set 15%
    on-resume  = brightnessctl -r
}

# ── 4 min: lock screen ───────────────────────────────────
listener {
    timeout    = 240
    on-timeout = qs -c noctalia-shell ipc call lockScreen lock
}

# ── 5 min: monitors off (DPMS) ───────────────────────────
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on && sleep 0.5 && hyprctl dispatch bringactivetotop
}

# ── 20 min: suspend ──────────────────────────────────────
listener {
    timeout    = 1200
    on-timeout = systemctl suspend
}
