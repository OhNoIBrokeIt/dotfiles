# =========================================================
# HYPRLAND CONFIG — v3.0 (Rocko_DE_Final)
# Main:  DP-1  5120x1440@240  OLED ultrawide
# Left:  DP-2  3840x2160@144  4K
# GPU:   RTX 4090 / Intel 14900K
#
# Sourced files:
#   conf/monitors.conf    — monitor config + workspaces
#   conf/animations.conf  — beziers + animation rules
#   conf/windowrules.conf — window + layer rules
#   conf/keybinds.conf    — all keybindings
# =========================================================


source = /home/ohnoibrokeit/.config/hypr/noctalia/noctalia-colors.conf

# -------------------------
# VARIABLES
# -------------------------
$mainMod     = SUPER
$terminal    = kitty
$fileManager = nemo
$browser     = firefox

# -------------------------
# ENVIRONMENT — NVIDIA / WAYLAND
# -------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# VRR / frame pacing — legacy GL vars removed (no effect on modern Wayland/NVIDIA)
# WLR_DRM_DEVICES removed — hardcoding /dev/dri/card0 risks pointing to iGPU

# Theming
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GTK_THEME,adw-gtk3
env = XCURSOR_THEME,Adwaita

# Wayland native hints
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


# -------------------------
# INPUT
# -------------------------
input {
    kb_layout    = us
    follow_mouse = 2
    mouse_refocus = false
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# -------------------------
# CURSOR
# -------------------------
cursor {
    inactive_timeout = 5
    hide_on_key_press = true
    no_break_fs_vrr  = 2
    min_refresh_rate = 48
    no_warps         = true
}

# -------------------------
# GENERAL
# -------------------------
general {
    gaps_in          = 6
    gaps_out         = 12
    border_size      = 2
    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle

    col.active_border   = $primary
    col.inactive_border = $surface

    snap {
        enabled = true  # snap floating windows to edges
    }
}

# -------------------------
# DECORATION
# -------------------------
decoration {
    rounding = 12

    blur {
        enabled           = false
        size              = 8
        passes            = 2
        new_optimizations = true
        xray              = false
    }

    shadow {
        enabled       = true
        range         = 16
        render_power  = 3
        ignore_window = true
        color         = rgba(00000066)
    }

    dim_inactive  = true
    dim_strength  = 0.08
}


# -------------------------
# LAYOUTS
# -------------------------
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = slave
}

# -------------------------
# RENDER
# -------------------------
render {
    cm_fs_passthrough = 2
    cm_auto_hdr       = 1
}

xwayland {
    force_zero_scaling = true  # prevents XWayland blur on scaled monitors (DP-2 1.25x)
}

# -------------------------
# MISC
# -------------------------
misc {
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    vfr                        = true
    render_unfocused_fps       = 60
    mouse_move_enables_dpms    = true
    key_press_enables_dpms     = true
    focus_on_activate          = false
    initial_workspace_tracking = 1
    background_color           = 0xff000000
    allow_session_lock_restore = true   # recover if lock screen crashes
    anr_missed_pings           = 5      # don't kill unresponsive windows too fast (games)
}


# =========================================================
# SOURCED CONFIG FILES
# =========================================================
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/exec.conf


