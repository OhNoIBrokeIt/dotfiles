# =========================================================
# KEYBINDS — Rocko_DE v3.0 (Noctalia)
# =========================================================

$ipc = qs -c noctalia-shell ipc call

# 1. APPLICATIONS
bind = $mainMod,       T,      exec,           $terminal                                    #"Terminal"
bind = $mainMod,       E,      exec,           $fileManager                                 #"File manager"
bind = $mainMod SHIFT, E,      exec,           kitty -e yazi                                #"Terminal file manager"
bind = $mainMod,       B,      exec,           $browser                                     #"Browser"

# 2. WINDOW MANAGEMENT
bind = $mainMod,       Q,      killactive,                                                  #"Close window"
bind = $mainMod SHIFT, Q,      exit,                                                        #"Exit Hyprland"
bind = $mainMod,       V,      togglefloating,                                              #"Toggle floating"
bind = $mainMod,       G,      togglegroup,                                                 #"Toggle group"
bind = $mainMod,       F,      fullscreen,     1                                            #"Toggle fullscreen"
bind = $mainMod SHIFT, F,      fullscreen,     0                                            #"True fullscreen"
bind = $mainMod,       P,      pseudo,                                                      #"Toggle pseudo-tile"

# 3. QUICKSHELL
bind = $mainMod,       R,      global,         quickshell:launcher                          #"App launcher"
bind = $mainMod SHIFT, L,      exec,           qs ipc call lock lock                        #"Lock screen"

# 4. NOCTALIA
bind = $mainMod,       D,      exec,           $ipc launcher toggle                         #"App launcher"
bind = $mainMod,       TAB,    exec,           $ipc launcher windows                        #"Window switcher"
bind = $mainMod,       C,      exec,           $ipc launcher clipboard                      #"Clipboard history"
bind = $mainMod,       period, exec,           $ipc launcher emoji                          #"Emoji picker"
bind = $mainMod,       N,      exec,           $ipc notifications toggleHistory             #"Notifications"
bind = $mainMod SHIFT, N,      exec,           $ipc notifications toggleDND                 #"Do not disturb"
bind = $mainMod,       M,      exec,           $ipc controlCenter toggle                    #"Control center"
bind = $mainMod,       X,      exec,           $ipc sessionMenu toggle                      #"Session menu"
bind = $mainMod,       comma,  exec,           $ipc settings toggle                         #"Settings"
bind = $mainMod SHIFT, W,      exec,           $ipc wallpaper random                        #"Random wallpaper"
bind = $mainMod CTRL,  W,      exec,           $ipc bar toggle                              #"Toggle bar"
bind = $mainMod,       I,      exec,           $ipc idleInhibitor toggle                    #"Toggle idle inhibitor"

# 4. SCRATCHPADS
bind = $mainMod,       grave,  exec,           pypr toggle console                          #"Drop-down terminal"
bind = $mainMod,       F1,     exec,           pypr toggle files                            #"Drop-down file manager"
bind = $mainMod,       slash,  exec,           $ipc plugin:keybind-cheatsheet toggle                        #"Keybind cheatsheet"

# 5. FOCUS
bind = $mainMod,       H,      movefocus,      l                                            #"Focus left"
bind = $mainMod,       L,      movefocus,      r                                            #"Focus right"
bind = $mainMod,       K,      movefocus,      u                                            #"Focus up"
bind = $mainMod,       J,      movefocus,      d                                            #"Focus down"
bind = $mainMod,       left,   movefocus,      l                                            #"Focus left"
bind = $mainMod,       right,  movefocus,      r                                            #"Focus right"
bind = $mainMod,       up,     movefocus,      u                                            #"Focus up"
bind = $mainMod,       down,   movefocus,      d                                            #"Focus down"
bind = ALT,            Tab,    cyclenext,                                                   #"Cycle windows"

# 6. MOVE WINDOWS
bind = $mainMod SHIFT, H,      movewindow,     l                                            #"Move window left"
bind = $mainMod SHIFT, L,      movewindow,     r                                            #"Move window right"
bind = $mainMod SHIFT, K,      movewindow,     u                                            #"Move window up"
bind = $mainMod SHIFT, J,      movewindow,     d                                            #"Move window down"

# 7. RESIZE WINDOWS
binde = $mainMod ALT,  H,      resizeactive,   -40 0                                        #"Resize left"
binde = $mainMod ALT,  L,      resizeactive,    40 0                                        #"Resize right"
binde = $mainMod ALT,  K,      resizeactive,    0 -40                                       #"Resize up"
binde = $mainMod ALT,  J,      resizeactive,    0  40                                       #"Resize down"

# 8. WORKSPACES
bind = $mainMod,       1,      workspace,      1                                            #"Workspace 1"
bind = $mainMod,       2,      workspace,      2                                            #"Workspace 2"
bind = $mainMod,       3,      workspace,      3                                            #"Workspace 3"
bind = $mainMod,       4,      workspace,      4                                            #"Workspace 4"
bind = $mainMod,       5,      workspace,      5                                            #"Workspace 5"
bind = $mainMod,       6,      workspace,      6                                            #"Workspace 6"
bind = $mainMod,       7,      workspace,      7                                            #"Workspace 7"
bind = $mainMod,       8,      workspace,      8                                            #"Workspace 8"
bind = $mainMod,       9,      workspace,      9                                            #"Workspace 9"
bind = $mainMod CTRL,  1,      movetoworkspace, 1                                           #"Move to workspace 1"
bind = $mainMod CTRL,  2,      movetoworkspace, 2                                           #"Move to workspace 2"
bind = $mainMod CTRL,  3,      movetoworkspace, 3                                           #"Move to workspace 3"
bind = $mainMod CTRL,  4,      movetoworkspace, 4                                           #"Move to workspace 4"
bind = $mainMod CTRL,  5,      movetoworkspace, 5                                           #"Move to workspace 5"
bind = $mainMod CTRL,  6,      movetoworkspace, 6                                           #"Move to workspace 6"
bind = $mainMod CTRL,  7,      movetoworkspace, 7                                           #"Move to workspace 7"
bind = $mainMod CTRL,  8,      movetoworkspace, 8                                           #"Move to workspace 8"
bind = $mainMod CTRL,  9,      movetoworkspace, 9                                           #"Move to workspace 9"
bind = $mainMod SHIFT CTRL, 1, movetoworkspacesilent, 1                                     #"Move silently to workspace 1"
bind = $mainMod SHIFT CTRL, 2, movetoworkspacesilent, 2                                     #"Move silently to workspace 2"
bind = $mainMod SHIFT CTRL, 3, movetoworkspacesilent, 3                                     #"Move silently to workspace 3"
bind = $mainMod SHIFT CTRL, 4, movetoworkspacesilent, 4                                     #"Move silently to workspace 4"
bind = $mainMod SHIFT CTRL, 5, movetoworkspacesilent, 5                                     #"Move silently to workspace 5"
bind = $mainMod SHIFT CTRL, 6, movetoworkspacesilent, 6                                     #"Move silently to workspace 6"
bind = $mainMod SHIFT CTRL, 7, movetoworkspacesilent, 7                                     #"Move silently to workspace 7"
bind = $mainMod SHIFT CTRL, 8, movetoworkspacesilent, 8                                     #"Move silently to workspace 8"
bind = $mainMod SHIFT CTRL, 9, movetoworkspacesilent, 9                                     #"Move silently to workspace 9"

# 9. MOUSE
bind  = $mainMod,      mouse_down, workspace,  e+1                                          #"Next workspace"
bind  = $mainMod,      mouse_up,   workspace,  e-1                                          #"Previous workspace"
bindm = $mainMod,      mouse:272,  movewindow                                               #"Drag window"
bindm = $mainMod,      mouse:273,  resizewindow                                             #"Resize window"

# 10. AUDIO
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+             #"Volume up"
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-             #"Volume down"
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle            #"Toggle mute"
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle          #"Toggle mic mute"
bind  = , XF86AudioPlay,        exec, playerctl play-pause                                  #"Play/pause"
bind  = , XF86AudioNext,        exec, playerctl next                                        #"Next track"
bind  = , XF86AudioPrev,        exec, playerctl previous                                    #"Previous track"

# 11. SCREENSHOTS
bind = ,       Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send -i camera "Screenshot" "Copied to clipboard" -t 2000  #"Area screenshot"
bind = SHIFT,  Print, exec, grim -g "$(slurp)" - | satty --filename -                       #"Area screenshot + annotate"
bind = CTRL,   Print, exec, grim - | wl-copy && notify-send -i camera "Screenshot" "Full screen copied" -t 2000                  #"Full screen screenshot"
bind = ALT,    Print, exec, FILE=~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && grim $FILE && notify-send -i camera "Screenshot saved" "$FILE" -t 3000  #"Save full screen"

# 12. GAMING
bind = $mainMod ALT,   G,      exec,           bash ~/.config/hypr/scripts/gamemode.sh      #"Toggle game mode"
bind = $mainMod SHIFT, F1,     exec,           hyprctl keyword monitor "DP-2,disable"       #"Disable DP-2"
bind = $mainMod SHIFT, F2,     exec,           hyprctl keyword monitor "DP-2,3840x2160@144,auto-top,1.25,bitdepth,10,cm,hdredid,sdrbrightness,1.20,sdrsaturation,1.05,vrr,2"  #"Enable DP-2"
