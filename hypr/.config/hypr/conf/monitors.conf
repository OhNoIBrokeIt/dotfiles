# =========================================================
# MONITORS
# =========================================================
# Main:  DP-1  5120x1440@240  OLED ultrawide (no scaling)
# Top:   DP-2  3840x2160@144  4K (1.25x scaling)

monitor = DP-1, 5120x1440@240, auto, 1, bitdepth, 10, cm, hdredid, sdrbrightness, 1.15, sdrsaturation, 1.05, vrr, 2
monitor = DP-2, 3840x2160@144, auto-up, 1.25, bitdepth, 10, cm, hdredid, sdrbrightness, 1.20, sdrsaturation, 1.05, vrr, 2

# =========================================================
# WORKSPACES
# =========================================================
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1

workspace = 7, monitor:DP-2, default:true
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2

workspace = special:scratch, on-created-empty:$terminal
